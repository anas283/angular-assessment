<div class="signin-container">
  <div class="card signin-card">
    <div class="card-header text-center">
      Sign in to your dashboard
    </div>
    <div class="card-body">
      <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <input
            type="email"
            class="form-control"
            formControlName="username"
            placeholder="Username"
            [class.is-invalid]="username?.invalid && username?.touched"
            autocomplete="username"
          />
          <div class="invalid-feedback" *ngIf="username?.invalid && username?.touched">
            <span *ngIf="username?.errors?.['required']">Username is required.</span>
            <span *ngIf="username?.errors?.['email']">Please enter a valid email.</span>
          </div>
        </div>

        <div class="form-group">
          <input
            type="password"
            class="form-control"
            formControlName="password"
            placeholder="Password"
            [class.is-invalid]="password?.invalid && password?.touched"
            autocomplete="current-password"
          />
          <div class="invalid-feedback" *ngIf="password?.invalid && password?.touched">
            Password is required.
          </div>
        </div>

        <div class="alert alert-danger" *ngIf="error">
          {{ error }}
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2" role="status" aria-hidden="true"></span>
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </div>
</div>
